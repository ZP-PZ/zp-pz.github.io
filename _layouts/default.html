<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="{{ page.description | default: site.description | escape }}">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="site-header">
    <div class="nav-container">
      <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>

      <nav class="site-nav" aria-label="Primary navigation">
        {% for item in site.nav %}
          {% assign item_url = item.url | relative_url %}
          <a href="{{ item_url }}"{% if page.url == item.url %} aria-current="page"{% endif %}>{{ item.name }}</a>
        {% endfor %}
      </nav>
    </div>
  </header>

  <main id="main" class="main-container{% if page.profile_image %} profile-layout{% endif %}">
    {% if page.profile_image %}
      <aside class="profile-column">
        <img
          class="profile-image"
          src="{{ page.profile_image | relative_url }}"
          alt="{{ page.profile_alt | default: site.title | escape }}"
        >
      </aside>
    {% endif %}

    <article class="prose">
      {{ content }}
    </article>
  </main>
</body>
</html>
